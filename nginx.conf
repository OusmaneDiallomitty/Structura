# ============================================================
# Nginx Config — Structura Production
# ============================================================
#
# Architecture :
#   app.votredomaine.com     → Frontend Next.js (port 3000)
#   app.votredomaine.com/api → Backend NestJS   (port 3001)
#   admin.votredomaine.com   → Admin panel      (port 3002)
#
# Installation (Ubuntu/Debian) :
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/structura
#   sudo ln -s /etc/nginx/sites-available/structura /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo certbot --nginx \
#     -d app.votredomaine.com \
#     -d admin.votredomaine.com
#   sudo systemctl reload nginx
#
# Remplacer "votredomaine.com" par votre vrai domaine partout.
# ============================================================

# ── Rate limiting zones ────────────────────────────────────────────────────
# 3 zones distinctes pour un contrôle précis :
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# Auth — anti brute-force login/register (5 req/min = très restrictif)
limit_req_zone  $binary_remote_addr zone=auth_limit:10m   rate=5r/m;

# API générale — 30 req/s par IP (utilisateur actif normal)
limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=30r/s;

# Global — 200 req/min toutes routes (protection de base)
limit_req_zone  $binary_remote_addr zone=global_limit:10m rate=200r/m;

# ── Compression gzip (réduit la bande passante de 60-80%) ─────────────────
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

# ── Upstreams ──────────────────────────────────────────────────────────────
upstream backend {
  server 127.0.0.1:3001;
  keepalive 64;  # Connexions persistantes → moins de handshakes TCP
}

upstream frontend {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream admin_panel {
  server 127.0.0.1:3002;
  keepalive 16;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
  listen 80;
  server_name app.votredomaine.com admin.votredomaine.com;
  return 301 https://$host$request_uri;
}

# ===========================================================================
# HTTPS — Application principale (app.votredomaine.com)
# ===========================================================================
server {
  listen 443 ssl http2;
  server_name app.votredomaine.com;

  # ── SSL (certbot gère le renouvellement automatique) ─────────────────────
  ssl_certificate     /etc/letsencrypt/live/app.votredomaine.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.votredomaine.com/privkey.pem;

  # Protocoles et ciphers modernes (A+ sur ssllabs.com)
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;  # TLS 1.3 gère l'ordre des ciphers lui-même
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;       # Désactivé pour forward secrecy parfaite

  # OCSP Stapling — réduit la latence SSL (~100ms économisés par connexion)
  ssl_stapling on;
  ssl_stapling_verify on;
  ssl_trusted_certificate /etc/letsencrypt/live/app.votredomaine.com/chain.pem;
  resolver 8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout 5s;

  # ── En-têtes de sécurité ──────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ── Limites globales ───────────────────────────────────────────────────────
  client_max_body_size 10M;   # Imports CSV + photos élèves
  limit_conn per_ip 50;
  limit_req zone=global_limit burst=300 nodelay;

  # ── Auth — anti brute-force (CRITIQUE) ────────────────────────────────────
  # Seulement 5 tentatives/min par IP sur login et register
  location = /api/auth/login {
    limit_req zone=auth_limit burst=10 nodelay;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /api/auth/register {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /api/auth/forgot-password {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── API Backend /api/* ────────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;

    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Buffers — évite que le backend attende que Nginx transfère au client
    proxy_buffer_size         16k;
    proxy_buffers             4 32k;
    proxy_busy_buffers_size   64k;
  }

  # ── Sentry tunnel (contourne les ad-blockers) ─────────────────────────────
  # tunnelRoute: '/monitoring' dans next.config.ts
  location /monitoring {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Health check ──────────────────────────────────────────────────────────
  location = /health {
    proxy_pass http://backend/api/health;
    access_log off;
  }

  # ── Fichiers statiques Next.js — cache 1 an (immutable) ──────────────────
  location /_next/static/ {
    proxy_pass http://frontend;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # ── Service Worker PWA — pas de cache (doit toujours être à jour) ─────────
  location ~* \.(js)$ {
    if ($uri ~* "sw\.js") {
      add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    proxy_pass http://frontend;
    access_log off;
  }

  # ── Frontend Next.js /* ───────────────────────────────────────────────────
  location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  # Logs
  access_log /var/log/nginx/structura_access.log;
  error_log  /var/log/nginx/structura_error.log warn;
}

# ===========================================================================
# HTTPS — Admin panel (admin.votredomaine.com)
# ===========================================================================
server {
  listen 443 ssl http2;
  server_name admin.votredomaine.com;

  ssl_certificate     /etc/letsencrypt/live/admin.votredomaine.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.votredomaine.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  ssl_stapling on;
  ssl_stapling_verify on;
  ssl_trusted_certificate /etc/letsencrypt/live/admin.votredomaine.com/chain.pem;
  resolver 8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout 5s;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # SECURITE : restreindre l'accès admin à votre IP fixe (recommandé fortement)
  # Décommenter les lignes ci-dessous et remplacer par votre IP :
  # allow 41.83.X.X;   # Votre IP bureau
  # allow 127.0.0.1;   # Localhost
  # deny all;

  client_max_body_size 10M;
  limit_conn per_ip 20;
  limit_req zone=global_limit burst=50 nodelay;

  # ── Auth admin — rate limit très strict ───────────────────────────────────
  location = /api/auth/login {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── API Backend /api/* ────────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Fichiers statiques admin ───────────────────────────────────────────────
  location /_next/static/ {
    proxy_pass http://admin_panel;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # ── Admin panel /* ─────────────────────────────────────────────────────────
  location / {
    proxy_pass http://admin_panel;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  access_log /var/log/nginx/structura_admin_access.log;
  error_log  /var/log/nginx/structura_admin_error.log warn;
}
